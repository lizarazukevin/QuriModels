---
# Builds QuriModels (Smithy models + generated Kotlin/Java client types).
name: Gradle Build & Lint

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout QuriModels
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Smithy validate + build (model validation, codegen, lint)
        run: ./gradlew smithyBuild --no-daemon

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Upload Smithy build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smithy-build-reports
          path: build/smithyprojections/
          retention-days: 14
